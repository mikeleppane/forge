name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      PY: python
      PYTEST: pytest
      RUFF: ruff
      MYPY: mypy
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint frontmatter (skills + commands)
        run: make frontmatter

      - name: Validate JSON Schemas + templates
        run: make validate-schemas

      - name: Validate plugin.json paths exist
        run: make plugin-path-validate

      - name: Validate Claude plugin manifest (best-effort)
        run: make plugin-validate

      - name: Run full quality gate
        run: make check

      - name: Per-file coverage floor gate
        run: make coverage-floor
